// groovy-swing is required at build-script evaluation time for SignatureRequester (SwingBuilder).
// It cannot be declared in the plugins {} block (not a Gradle plugin), so it stays here.
// Note: buildscript {} must precede plugins {} per Gradle rules.
buildscript {
    repositories {
        google()
        mavenCentral()
        maven { url = "https://chaquo.com/maven" }
        maven { url = "https://plugins.gradle.org/m2/" }
    }
    dependencies {
        classpath "org.apache.groovy:groovy-swing:5.0.5"
    }
}

plugins {
    id 'com.android.application' version '9.0.1'
    id 'com.google.gms.google-services' version '4.4.4'
    id 'com.google.firebase.crashlytics' version '3.0.7'
    id 'com.chaquo.python' version '17.0.0'
    // org.jetbrains.kotlin.android is no longer needed: AGP 9.0+ has built-in Kotlin support.
}

repositories {
    google()
    mavenCentral()
    maven { url "https://oss.sonatype.org/content/repositories/snapshots" }
    maven {
        url "https://dl.frostwire.com/maven"
        content {
            includeGroup "com.frostwire"
        }
    }
}

def manifestVersionCode() {
    def manifestFile = new File(project.projectDir.absolutePath + '/AndroidManifest.xml')
    def ns = new Namespace("http://schemas.android.com/apk/res/android", "android")
    def xml = new XmlParser().parse(manifestFile)
    //System.out.println("manifestVersionCode: xml.attributes()[ns.versionCode].toString()=" + xml.attributes()[ns.versionCode].toString())
    return Integer.parseInt(xml.attributes()[ns.versionCode].toString())
}

def manifestVersionName() {
    def manifestFile = file(project.projectDir.absolutePath + '/AndroidManifest.xml')
    def ns = new Namespace("http://schemas.android.com/apk/res/android", "android")
    def xml = new groovy.xml.XmlParser().parse(manifestFile)
    //System.out.println("manifestVersionName: " + xml.attributes()[ns.versionName].toString())
    return xml.attributes()[ns.versionName].toString()
}

// APK output renaming is wired up via androidComponents.onVariants after android {} block.

project.ext.versionCode = manifestVersionCode()
project.ext.versionName = manifestVersionName()
def plusReleaseApkName = "frostwire-android-release-${project.ext.versionName}-b${project.ext.versionCode}-plus.apk"

boolean isAssembleRelease = gradle.startParameter.taskNames.contains("assembleRelease") || gradle.startParameter.taskNames.contains("assemblePlus1Release")
boolean isRootAssembleRelease = gradle.startParameter.taskNames.contains("assembleRelease")

def firstNonBlank(Object... values) {
    for (Object value : values) {
        if (value == null) {
            continue
        }
        String text = value.toString().trim()
        if (!text.isEmpty()) {
            return text
        }
    }
    return ""
}

def loadAndroidSigningProperties() {
    Properties properties = new Properties()
    File propertiesFile = file("../../frostwire-tools/certs/android.keystore/build.properties")
    if (propertiesFile.exists()) {
        propertiesFile.withInputStream { properties.load(it) }
    }
    return properties
}

def androidSigningProperties = loadAndroidSigningProperties()
def androidSigningEnvKeyPassword = firstNonBlank(System.getenv("FROSTWIRE_ANDROID_KEY_PASSWORD"))
def androidSigningKeyAlias = firstNonBlank(
        project.findProperty("frostwireAndroidKeyAlias"),
        System.getenv("FROSTWIRE_ANDROID_KEY_ALIAS"),
        androidSigningProperties.getProperty("key.alias", "")
)
def androidSigningKeyPassword = firstNonBlank(
        project.findProperty("frostwireAndroidKeyPassword"),
        androidSigningEnvKeyPassword
)

if (isRootAssembleRelease && !androidSigningEnvKeyPassword) {
    throw new GradleException(
            "assembleRelease requires FROSTWIRE_ANDROID_KEY_PASSWORD to be set in the environment.\n" +
                    "Example:\n" +
                    "  export FROSTWIRE_ANDROID_KEY_PASSWORD='your-keystore-password'\n" +
                    "  ./gradlew clean assembleRelease"
    )
}

android {
    namespace "com.frostwire.android"

    compileSdk = 36  // Android 15 SnowCone

    defaultConfig {
        applicationId "com.frostwire.android"
        versionName project.ext.versionName
        minSdkVersion 26 // Android 8.0 Oreo
        targetSdkVersion 34 // Android 14 (more involved upgrade, crashes on targetsdkversion 35)
        multiDexEnabled true

        ndk {
            abiFilters "arm64-v8a", "x86_64"
        }

        python {
            def brewPython = "/opt/homebrew/bin/python3.13"
            if (new File(brewPython).exists()) {
                buildPython brewPython
            }
            chaquopy {
                defaultConfig {
                    version "3.13"
                }
            }
            pip {
                install "yt_dlp[default]==2026.3.17"
                // helps a lot with debugging
                //options "--verbose"
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    tasks.withType(JavaCompile).configureEach {
        options.compilerArgs << "-Xlint:deprecation"
        options.compilerArgs << "-Xlint:unchecked"
    }

    kotlin {
        jvmToolchain(17)
    }

    sourceSets {
        main {
            manifest.srcFile 'AndroidManifest.xml'
            res.srcDirs = ['res', 'apollo/res']
            aidl.srcDirs = ['src', 'apollo/src']
            assets.srcDirs = ['assets']
            java {
                srcDir '../common/src/main/java'
                srcDir 'apollo/src'
                srcDir 'src/main/java'
                exclude 'test/**'
            }
            jniLibs.srcDirs = ['libs']
            // Ensure Chaquopy packages our Python code from src/main/python
            python {
                srcDir 'src/main/python'
            }
        }
        test {
            java.srcDirs = ['src/test/java']
        }
    }


    signingConfigs {
        release {
            if (isAssembleRelease) {
                storeFile file("../../frostwire-tools/certs/android.keystore/frostwire.keystore")
                def sigRequester = new SignatureRequester(androidSigningKeyAlias, androidSigningKeyPassword)
                sigRequester.ask()
                if (!sigRequester.keyAlias()) {
                    throw new GradleException("Android signing key alias is empty. Check ../../frostwire-tools/certs/android.keystore/build.properties.")
                }
                if (!sigRequester.keyPassword()) {
                    throw new GradleException("Android signing key password is empty.")
                }
                storePassword sigRequester.keyPassword()
                keyAlias sigRequester.keyAlias()
                keyPassword sigRequester.keyPassword()
            } else {
                storePassword ''
                keyAlias ''
                keyPassword ''
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                    'proguard-rules.pro'
            signingConfig signingConfigs.release
            multiDexKeepFile file('multidex-config.txt')
        }
        debug {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                    'proguard-rules.pro'
            multiDexKeepFile file('multidex-config.txt')
        }
    }

    flavorDimensions "classicApp"

    productFlavors {
        plus1 {
            // OLD PLUS CODE VERSION SUFFIX 9070000
            dimension "classicApp"
            versionCode 9090000 + project.ext.versionCode
            resValue "string", "application_label", "FrostWire Plus"
        }
    }
    lint {
        abortOnError false
    }

    testOptions {
        unitTests {
            includeAndroidResources = true
            all {
                jvmArgs '-Djava.awt.headless=true'
                jvmArgs '--add-opens=java.base/java.lang=ALL-UNNAMED'
            }
        }
    }

    configurations {
        configureEach {
            exclude group: "com.google.android.gms.common", module: "play-services-measurement"
            exclude group: 'com.google.android.gms.common', module: 'play-services-base'
        }
    }
    buildFeatures {
        aidl true
        buildConfig true
        resValues true
    }
}

// Replaces the old applicationVariants.configureEach { changeApkOutput(variant) } call.
// AGP new DSL: use androidComponents.onVariants to rename APK output.
androidComponents {
    onVariants(selector().all()) { variant ->
        variant.outputs.each { output ->
            if (variant.buildType == "release") {
                output.outputFileName.set(plusReleaseApkName)
            } else {
                def flavor = 'plus'
                def suffix = project.ext.versionName + '-b' + project.ext.versionCode + '-' + flavor
                def apkName = "frostwire-android-" + variant.buildType + '-' + suffix + '.apk'
                output.outputFileName.set(apkName)
            }
        }
    }
}

