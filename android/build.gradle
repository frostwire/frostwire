afterEvaluate {
    def uploadTask = tasks.findByName('uploadCrashlyticsMappingFilePlus1Release')
    if (uploadTask != null) {
        uploadTask.dependsOn ':processPlus1ReleaseGoogleServices'
    }
}

def pythonProguardRulesFile = layout.buildDirectory.file("python/proguard-rules.pro")

def ensurePythonProguardRules = tasks.register("ensurePythonProguardRules") {
    outputs.file(pythonProguardRulesFile)
    doLast {
        File proguardFile = pythonProguardRulesFile.get().asFile
        if (!proguardFile.parentFile.exists()) {
            proguardFile.parentFile.mkdirs()
        }
        if (!proguardFile.exists()) {
            proguardFile.text = "# Placeholder file for Chaquopy/R8 integration on release builds.\n"
        }
    }
}

ensurePythonProguardRules.configure {
    mustRunAfter(tasks.named("clean"))
}

tasks.matching {
    it.name == "minifyPlus1ReleaseWithR8" ||
            (it.name.contains("Plus1Release") && it.name.toLowerCase().contains("lint"))
}.configureEach {
    dependsOn(ensurePythonProguardRules)
}

def copyPlus1ReleaseApkToWorkspaceBuild = tasks.register("copyPlus1ReleaseApkToWorkspaceBuild", Copy) {
    dependsOn(tasks.named("assemblePlus1Release"))
    from(layout.buildDirectory.file("outputs/apk/plus1/release/${plusReleaseApkName}"))
    into(layout.buildDirectory)
}

tasks.matching { it.name in ["assembleRelease", "assemblePlus1Release"] }.configureEach {
    finalizedBy(copyPlus1ReleaseApkToWorkspaceBuild)
}

class SignatureRequester {
    private final String defaultKeyAlias
    private final String providedKeyPassword
    String myKeyAlias = ""
    String myKeyPassword = ""

    SignatureRequester(String defaultKeyAlias = "", String providedKeyPassword = "") {
        this.defaultKeyAlias = defaultKeyAlias != null ? defaultKeyAlias.trim() : ""
        this.providedKeyPassword = providedKeyPassword != null ? providedKeyPassword : ""
    }

    void ask() {
        this.myKeyAlias = defaultKeyAlias
        this.myKeyPassword = providedKeyPassword
        if (this.myKeyPassword) {
            return
        }

        def console = System.console()
        System.out.println("System.console()=" + console)

        if (console != null) {
            def aliasPrompt = defaultKeyAlias ? "\nKey Alias [${defaultKeyAlias}]: " : "\nKey Alias: "
            def aliasInput = console.readLine(aliasPrompt)
            char[] passwordInput = console.readPassword("\nKey Password: ")
            this.myKeyAlias = aliasInput != null && aliasInput.trim() ? aliasInput.trim() : defaultKeyAlias
            this.myKeyPassword = passwordInput != null ? new String(passwordInput) : ""
            if (!this.myKeyPassword) {
                def visiblePassword = console.readLine("Key Password (visible input): ")
                this.myKeyPassword = visiblePassword != null ? visiblePassword : ""
            }
            return
        }

        System.setProperty('java.awt.headless', 'false')
        def swing = new SwingBuilder()
        swing.edt {
            def dialogRef
            def inputAlias
            def inputPassword

            dialogRef = swing.dialog(
                    modal: true,
                    title: 'Enter keystore data',
                    alwaysOnTop: true,
                    resizable: true,
                    locationRelativeTo: null,
                    size: [215, 147]
            ) {
                vbox {
                    label(text: "Key Alias:")
                    inputAlias = textField(text: defaultKeyAlias)
                    label(text: "Key Password:")
                    inputPassword = passwordField()
                    button(defaultButton: true, text: 'OK', actionPerformed: {
                        this.myKeyAlias = inputAlias.text != null && inputAlias.text.trim() ? inputAlias.text.trim() : defaultKeyAlias
                        this.myKeyPassword = new String(inputPassword.password)
                        dialogRef.dispose()
                    })
                }
            }
            dialogRef.pack()
            dialogRef.setLocationRelativeTo(null)
            dialogRef.visible = true
        }
    }

    String keyAlias() {
        this.myKeyAlias
    }

    String keyPassword() {
        this.myKeyPassword
    }
}
